name: bump indirect modules
on:
  schedule:
  - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  bump-indirect-modules:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Go
      id: setup-go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: stable
        check-latest: true
        cache: false
    - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: go-cache
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: go-ubuntu-latest-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}
        restore-keys: |
          go-${{ steps.setup-go.outputs.go-version }}-
    - name: Bump indirect modules
      run: |
        ./scripts/bump-indirect-modules.sh || true && go mod tidy
        cd plugin/testdata/wasm/src && go mod tidy
    - name: Build
      run: make build
    - name: Run examples
      env:
        SCENARIGO_COLOR: true
      run: make test/examples
    - name: Show diff
      run: git add -N . && git diff
    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
      with:
        app_id: ${{ secrets.WRITE_APP_ID }}
        private_key: ${{ secrets.WRITE_PRIVATE_KEY }}
    - name: Create pull request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ steps.generate_token.outputs.token }}
        commit-message: 'chore(deps): bump indirect modules'
        branch: bump-indirect-modules
        base: main
        sign-commits: true
        title: 'chore(deps): bump indirect modules'
        body: ''
        labels: dependencies
        reviewers: zoncoen
