---
name: "vars dot completion"
document: |
  schemaVersion: scenario/v1
  title: test
  vars:
    myVar: hello
    otherVar: world
  steps:
    - title: step1
      request:
        url: '{{vars.$0'
operation: completion
expect:
  completionLabels:
    contains: [myVar, otherVar]
---
name: "secrets dot completion"
